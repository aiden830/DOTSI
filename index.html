<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>DOTSI WORLD</title>
    <meta
      name="description"
      content="DOTSI WORLD - The Little o_w Adventure, a cozy browser platformer prototype."
    />
    <link rel="icon" href="./favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <div class="game-frame">
        <canvas id="game-canvas" width="1280" height="720" aria-label="DOTSI WORLD game canvas"></canvas>
        <div class="touch-controls" id="touch-controls" aria-hidden="true">
          <button class="touch-btn touch-left" data-touch="left">◀</button>
          <button class="touch-btn touch-right" data-touch="right">▶</button>
          <button class="touch-btn touch-jump" data-touch="jump">✦</button>
        </div>
      </div>
    </div>
    <script type="module" src="./src/main.js"></script>
  </body>
</html>
